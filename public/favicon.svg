<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff2e4c"/>
      <stop offset="100%" stop-color="#e60023"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background Card -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect width="62" height="62" x="1" y="1" rx="15" stroke="url(#redGrad)" stroke-width="1.5" stroke-opacity="0.6"/>
  
  <!-- TubeFetch Red Badge -->
  <rect x="12" y="18" width="40" height="28" rx="8" fill="url(#redGrad)" filter="url(#glow)"/>
  
  <!-- White Download Arrow inside badge -->
  <path d="M32 23V33M32 33L26 27M32 33L38 27" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="24" y1="37" x2="40" y2="37" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
</svg>
